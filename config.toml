db_path      = "namco_tasks.db"
log_level    = "INFO"
results_file = "results.jsonl"

# ── 运行模式 ──────────────────────────────────────────────────────────────────
# "checkout"  : 完整流程 login→find→cart→seisan→confirm→complete
# "cart"      : 只到加购物车为止
# "dry"       : 只登录+查票，不下单
# "warmup"    : 提前登录所有账号，在 lottery_open 时刻同步触发抢票
mode = "checkout"

# ── 预热定时（仅 mode="warmup" 时生效）───────────────────────────────────────
lottery_open       = ""    # 开抢时刻 e.g. "2026-07-04T10:00:00+09:00"
pre_login_minutes  = 10    # 提前几分钟完成所有账号登录
keepalive_interval = 60    # 保活 ping 间隔（秒）

# ── 账号列表 ─────────────────────────────────────────────────────────────────
# slot_index: -1=自动选第一个时间段; 0=第1个; 1=第2个; 以此类推
# 如果配置了 [target].slot_weights，则自动按权重分配，无需手动填 slot_index

