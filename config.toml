[scheduler]
max_concurrent = 3
delay_min      = 3.0
delay_max      = 7.0

[retry]
max_attempts = 3
initial_wait = 5.0
max_wait     = 40.0
jitter       = 5.0

[proxy]
pool      = []
max_fails = 3
# pool = [
#   "http://user:pass@jp-proxy1:port",
#   "http://user:pass@jp-proxy2:port",
# ]

[rate_limit]
requests_per_second = 0.5
burst               = 2

[circuit_breaker]
failure_threshold = 5
recovery_timeout  = 120.0

[target]
event_keyword   = "OP-16"
lottery_keyword = "抽選"

# ── 时间段自动分配权重 ────────────────────────────────────────────────────────
# 对应票页面 PRIORITY_ITEMPROPERTY_CD_MATRIX_0 下拉框（排除占位项后从 0 开始）。
# OP-16 实测=每小时一档、两天共 18 个时段（2026-06-28 实测，详见 docs/SITE_NOTES.md）：
#   7/4(土): 0=11:00 1=12:00 2=13:00 3=14:00 4=15:00 5=16:00 6=17:00 7=18:00 8=19:00
#   7/5(日): 9=11:00 10=12:00 11=13:00 12=14:00 13=15:00 14=16:00 15=17:00 16=18:00 17=19:00
# 权重数组按 slot 顺序填（数字=分到该时段的账号数，按 账号序号%总和 循环分配）。
# 例（偏好午后高峰）: slot_weights = [50,50,80,80,80,80,80,50,30, 50,50,80,80,80,80,80,50,30]
# ⚠️ 抽選(摇号)下时段只决定中签后入场时刻，不影响中签率；权重每场当面跟用户确认。
#
# 留空 = 所有账号都选第一个可用时段（当前测试用）
slot_weights = []
