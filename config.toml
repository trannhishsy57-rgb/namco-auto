# 添加更多账号（后续扩展至10/100/1000）:
# [[accounts]]
# email        = "account4@livee.email"
# password     = "Qwe123456"
# target_store = ""   # 留空自动选店铺；填"東京"则只选东京场
# slot_index   = 2    # 手动指定第3个时间段（0-based）

[scheduler]
max_concurrent = 3
delay_min      = 3.0
delay_max      = 7.0

[retry]
max_attempts = 3
initial_wait = 5.0
max_wait     = 40.0
jitter       = 5.0

[proxy]
pool      = []
max_fails = 3
# pool = [
#   "http://user:pass@jp-proxy1:port",
#   "http://user:pass@jp-proxy2:port",
# ]

[rate_limit]
requests_per_second = 0.5
burst               = 2

[circuit_breaker]
failure_threshold = 5
recovery_timeout  = 120.0

[target]
event_keyword   = "OP-16"
lottery_keyword = "抽選"

# ── 时间段自动分配权重 ────────────────────────────────────────────────────────
# 对应票页面 PRIORITY_ITEMPROPERTY_CD_MATRIX_0 下拉框选项（排除「选択してください」后）
# 索引 0=7/4 11:00, 1=7/4 13:30, 2=7/4 16:00, 3=7/4 18:30
#      4=7/5 11:00, 5=7/5 13:30, 6=7/5 16:00, 7=7/5 18:30
# 例：1000个账号 → 300个抢第0时段，其余每时段100个
# slot_weights = [300, 100, 100, 100, 100, 100, 100, 100]
#
# 留空 = 所有账号都选第一个可用时段（当前3账号测试用）
slot_weights = []
